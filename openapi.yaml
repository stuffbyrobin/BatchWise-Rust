    CreateEventRequest:
      type: object
      required: [event_type]
      properties:
        event_type: { type: string, enum: [service, calibration, repair, inspection, cleaning, other] }
        schedule_id: { type: ["string", "null"], format: uuid }
        performed_at: { type: ["string", "null"], format: date-time }
        performed_by: { type: ["string", "null"], maxLength: 255 }
        cost_pence: { type: ["integer", "null"], minimum: 0 }
