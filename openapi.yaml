        equipment_id: { type: string, format: uuid }
        equipment_name: { type: string }
        equipment_type: { type: string }
        task_name: { type: string }
        interval_days: { type: integer }
        last_performed_at: { type: ["string", "null"], format: date-time }
        next_due_at: { type: string, format: date-time }
        days_until_due: { type: integer }
        is_overdue: { type: boolean }

    MaintenanceDueList:
      type: object
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/MaintenanceDueItem" } }
        total: { type: integer }
        page: { type: integer }
        page_size: { type: integer }
        total_pages: { type: integer }

  responses:
    BadRequest:
      description: Validation failure or malformed JSON
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    Unauthorized:
      description: Missing or invalid token
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    NotFound:
      description: Resource not found
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    Conflict:
      description: Duplicate resource
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    UnprocessableEntity:
      description: Business rule violation
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    Forbidden:
      description: Feature not enabled for this tenant
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    UnsupportedMediaType:
      description: Unsupported request media type
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
tags:
  - name: system
    description: Health and operational endpoints
  - name: auth
    description: Authentication and user profile
  - name: tenants
    description: Tenant management
  - name: library
    description: Reference-data library (styles, equipment, mash profiles, yeasts)
  - name: inventory
    description: Ingredient lots, stock movements, and FIFO deduction
  - name: tracking
    description: Container asset tracking, logs, and QR codes (gated on tracking feature flag)
  - name: reporting
    description: Cost rates, batch costs, and cost reports (gated on reporting feature flag)
  - name: sales
    description: Customers, sales orders, order FSM, and duty crystallisation events (gated on sales feature flag)
  - name: procurement
    description: Supplier records and purchase orders (gated on procurement feature flag)
  - name: audit
    description: Compliance audit trail (immutable log of compliance events)
  - name: label-design
    description: Label, pump-clip, and cask-lens design and print-ready PDF rendering (gated on label_design feature flag)
paths:
  /api/v1/auth/register:
    post:
      operationId: register
      summary: Register a new user and tenant
      security: []
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterRequest" }
      responses:
        "201":
          description: User and tenant created
          headers:
            Location:
              schema: { type: string }
              description: URL of the new user resource
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/v1/auth/login:
    post:
      operationId: login
      summary: Log in with email and password
      security: []
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: Successful login
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Account inactive
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }

  /api/v1/auth/refresh:
    post:
      operationId: refresh
      summary: Exchange a refresh token for a new token pair
      security: []
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RefreshRequest" }
      responses:
        "200":
          description: New token pair issued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Account inactive
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }

  /api/v1/auth/logout:
    post:
      operationId: logout
      summary: Invalidate a refresh token
      security: []
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LogoutRequest" }
      responses:
        "204":
          description: Logged out (also returned for unknown tokens)

  /api/v1/auth/me:
    get:
      operationId: getMe
      summary: Get current user profile
      tags: [auth]
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MeResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    patch:
      operationId: updateMe
      summary: Update display name or password
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateMeRequest" }
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MeResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    delete:
      operationId: deleteMe
      summary: Deactivate own account (soft delete)
      tags: [auth]
      responses:
        "204": { description: Account deactivated }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/tenants/current:
    get:
      operationId: getCurrentTenant
      summary: Get the authenticated user's tenant
      tags: [tenants]
      responses:
        "200":
          description: Tenant details
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Tenant" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    patch:
      operationId: updateCurrentTenant
      summary: Update tenant name, country, or region (owner only)
      tags: [tenants]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateTenantRequest" }
      responses:
        "200":
          description: Updated tenant
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Tenant" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Caller is not the tenant owner
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
        "409": { $ref: "#/components/responses/Conflict" }

  /healthz:
    get:
      operationId: healthCheck
      summary: Health check
      security: []
      tags: [system]
      responses:
        "200": { description: OK }
        "503": { description: Degraded }
  /api/v1/library/styles:
    get:
      operationId: listStyles
      summary: List beer styles (system + tenant union)
      tags: [library]
      parameters:
        - { name: name, in: query, schema: { type: string } }
        - { name: category, in: query, schema: { type: string } }
        - { name: sort, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer } }
        - { name: page_size, in: query, schema: { type: integer } }
      responses:
        "200":
          description: Paginated styles
          content: { application/json: { schema: { allOf: [{ $ref: "#/components/schemas/Pagination" }, { properties: { items: { items: { $ref: "#/components/schemas/Style" } } } }] } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      operationId: createStyle
      summary: Create a beer style
      tags: [library]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/StyleRequest" } } }
      responses:
        "201":
          description: Style created
          headers:
            Location: { schema: { type: string } }
          content: { application/json: { schema: { $ref: "#/components/schemas/Style" } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/v1/library/styles/{id}:
    get:
      operationId: getStyle
      summary: Get a beer style by ID
      tags: [library]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: Style, content: { application/json: { schema: { $ref: "#/components/schemas/Style" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      operationId: replaceStyle
      summary: Replace a beer style
      tags: [library]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/StyleRequest" } } }
      responses:
        "200": { description: Updated style, content: { application/json: { schema: { $ref: "#/components/schemas/Style" } } } }
