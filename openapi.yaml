openapi: 3.1.0
info:
  title: Batchwise API
  version: 1.0.0
  description: Multi-tenant brewery management API.
servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://api.batchwise.example
    description: Production (configurable)
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    # ── Label & Print Design (Phase 19) ──────────────────────────────────────
    DesignOptions:
      type: object
      properties:
        show_ingredient_list: { type: boolean }
        show_energy: { type: boolean }
        show_units: { type: boolean }
        show_responsible_drinking: { type: boolean }
        show_tasting_notes: { type: boolean }
    BrandAsset:
      type: object
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        filename: { type: string }
        content_type: { type: string, enum: [image/png, image/jpeg] }
        byte_size: { type: integer }
        created_at: { type: string, format: date-time }
    BrandProfile:
      type: object
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        name: { type: string }
        primary_color: { type: string }
        secondary_color: { type: string }
        font_family: { type: string, enum: [helvetica, times, courier] }
        logo_asset_id: { type: ["string", "null"], format: uuid }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    BrandProfileList:
      type: object
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/BrandProfile" } }
    CreateBrandProfileRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        primary_color: { type: ["string", "null"] }
        secondary_color: { type: ["string", "null"] }
        font_family: { type: ["string", "null"], enum: [helvetica, times, courier, null] }
        logo_asset_id: { type: ["string", "null"], format: uuid }
    PatchBrandProfileRequest:
      type: object
      properties:
        name: { type: ["string", "null"] }
        primary_color: { type: ["string", "null"] }
        secondary_color: { type: ["string", "null"] }
        font_family: { type: ["string", "null"], enum: [helvetica, times, courier, null] }
        logo_asset_id: { type: ["string", "null"], format: uuid }
    LabelDesign:
      type: object
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        kind: { type: string, enum: [bottle, can, pump_clip, cask_lens] }
        name: { type: string }
        batch_id: { type: ["string", "null"], format: uuid }
        recipe_id: { type: ["string", "null"], format: uuid }
        brand_profile_id: { type: ["string", "null"], format: uuid }
        size_key: { type: string }
        template_key: { type: string }
        options: { $ref: "#/components/schemas/DesignOptions" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    LabelDesignList:
      type: object
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/LabelDesign" } }
        total: { type: integer }
        page: { type: integer }
        page_size: { type: integer }
        total_pages: { type: integer }
    CreateLabelDesignRequest:
      type: object
      required: [kind, name, size_key, template_key]
      properties:
        kind: { type: string, enum: [bottle, can, pump_clip, cask_lens] }
        name: { type: string }
        batch_id: { type: ["string", "null"], format: uuid }
        recipe_id: { type: ["string", "null"], format: uuid }
        brand_profile_id: { type: ["string", "null"], format: uuid }
        size_key: { type: string }
        template_key: { type: string }
        options: { $ref: "#/components/schemas/DesignOptions" }
    PatchLabelDesignRequest:
      type: object
      properties:
        name: { type: ["string", "null"] }
        brand_profile_id: { type: ["string", "null"], format: uuid }
        size_key: { type: ["string", "null"] }
        template_key: { type: ["string", "null"] }
        options: { $ref: "#/components/schemas/DesignOptions" }
    RenderTasting:
      type: object
      properties:
        aroma: { type: ["string", "null"] }
        flavour: { type: ["string", "null"] }
        mouthfeel: { type: ["string", "null"] }
        finish: { type: ["string", "null"] }
    RenderBrand:
      type: object
      properties:
        brewery_name: { type: string }
        primary_color: { type: string }
        secondary_color: { type: string }
        font_family: { type: string }
        logo_asset_id: { type: ["string", "null"], format: uuid }
    RenderFields:
      type: object
      properties:
        product_name: { type: string }
        style: { type: ["string", "null"] }
        abv_percent: { type: number }
        allergens: { type: array, items: { type: string } }
        net_volume_ml: { type: ["integer", "null"] }
        responsible_party: { type: ["string", "null"] }
        country_of_origin: { type: ["string", "null"] }
        best_before_date: { type: ["string", "null"] }
        lot_identifier: { type: ["string", "null"] }
        ingredient_list: { type: ["string", "null"] }
        energy_kj_per_100ml: { type: ["number", "null"] }
        energy_kcal_per_100ml: { type: ["number", "null"] }
        alcohol_units_per_serving: { type: ["number", "null"] }
        tasting: { oneOf: [{ $ref: "#/components/schemas/RenderTasting" }, { type: "null" }] }
    RenderModel:
      type: object
      properties:
        design_id: { type: string, format: uuid }
        kind: { type: string, enum: [bottle, can, pump_clip, cask_lens] }
        size_key: { type: string }
        template_key: { type: string }
        width_mm: { type: number }
        height_mm: { type: number }
        shape: { type: string, enum: [rect, circle] }
        brand: { $ref: "#/components/schemas/RenderBrand" }
        fields: { $ref: "#/components/schemas/RenderFields" }
        options: { $ref: "#/components/schemas/DesignOptions" }
    RegisterRequest:
      type: object
      required: [email, password, display_name]
      additionalProperties: false
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 12, maxLength: 128 }
        display_name: { type: string, minLength: 1, maxLength: 100 }
        tenant_name: { type: string, minLength: 1, maxLength: 100 }
        country: { type: string, minLength: 2, maxLength: 2 }
        region: { type: string, maxLength: 100 }
    LoginRequest:
      type: object
      required: [email, password]
      additionalProperties: false
      properties:
        email: { type: string, format: email }
        password: { type: string }
    RefreshRequest:
      type: object
      required: [refresh_token]
      additionalProperties: false
      properties:
        refresh_token: { type: string }
    LogoutRequest:
      type: object
      required: [refresh_token]
      additionalProperties: false
      properties:
        refresh_token: { type: string }
    UpdateMeRequest:
      type: object
      additionalProperties: false
      properties:
        display_name: { type: string, minLength: 1, maxLength: 100 }
        current_password: { type: string }
        new_password: { type: string, minLength: 12, maxLength: 128 }
    AuthResponse:
      type: object
      required: [user_id, tenant_id, email, display_name, is_owner, access_token, refresh_token, token_type, expires_in]
      properties:
        user_id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        email: { type: string, format: email }
        display_name: { type: string }
        is_owner: { type: boolean }
        access_token: { type: string }
        refresh_token: { type: string }
        token_type: { type: string, enum: [Bearer] }
        expires_in: { type: integer, description: "Access token TTL in seconds" }
    MeResponse:
      type: object
      required: [user_id, tenant_id, email, display_name, is_owner, tenant_name, tier, country, feature_flags, created_at]
      properties:
        user_id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        email: { type: string, format: email }
        display_name: { type: string }
        is_owner: { type: boolean }
        tenant_name: { type: string }
        tier: { type: string, enum: [home, pro, enterprise] }
        country: { type: string }
        region: { type: ["string", "null"] }
        feature_flags:
          type: object
          additionalProperties: { type: boolean }
        created_at: { type: string, format: date-time }
    Tenant:
      type: object
      required: [id, tenant_name, tier, country, feature_flags, created_at]
      properties:
        id: { type: string, format: uuid }
        tenant_name: { type: string }
        tier: { type: string, enum: [home, pro, enterprise] }
        country: { type: string }
        region: { type: ["string", "null"] }
        address: { type: string, description: "Free-text brewery address used for label responsible_party." }
        feature_flags:
          type: object
          additionalProperties: { type: boolean }
        next_batch_number: { type: ["integer", "null"] }
        next_order_number: { type: ["integer", "null"] }
        ibu_method: { type: string, enum: [tinseth, rager], default: tinseth }
        sbr_annual_production_hl_pa: { type: number, minimum: 0 }
        created_at: { type: string, format: date-time }
    UpdateTenantRequest:
      type: object
      additionalProperties: false
      properties:
        tenant_name: { type: string, minLength: 1, maxLength: 100 }
        country: { type: string, minLength: 2, maxLength: 2 }
        region: { type: string, maxLength: 100 }
        address: { type: string }
        next_batch_number: { type: ["integer", "null"], minimum: 1 }
        next_order_number: { type: ["integer", "null"], minimum: 1 }
        ibu_method: { type: string, enum: [tinseth, rager] }
        sbr_annual_production_hl_pa: { type: number, minimum: 0 }
    Error:
      type: object
      required: [code, message, request_id]
      properties:
        code: { type: string }
        message: { type: string }
        details: { type: object, additionalProperties: true }
        request_id: { type: string }
    Pagination:
      type: object
      required: [items, total, page, page_size, total_pages]
      properties:
        items: { type: array, items: {} }
        total: { type: integer }
        page: { type: integer }
        page_size: { type: integer }
        total_pages: { type: integer }
    Style:
      type: object
      required: [id, tenant_id, name, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        name: { type: string }
        category: { type: ["string", "null"] }
        og_min: { type: ["number", "null"] }
        og_max: { type: ["number", "null"] }
        fg_min: { type: ["number", "null"] }
        fg_max: { type: ["number", "null"] }
        ibu_min: { type: ["number", "null"] }
        ibu_max: { type: ["number", "null"] }
        srm_min: { type: ["number", "null"] }
        srm_max: { type: ["number", "null"] }
        abv_min: { type: ["number", "null"] }
        abv_max: { type: ["number", "null"] }
        notes: { type: ["string", "null"] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    StyleRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 255 }
        category: { type: string, maxLength: 100 }
        og_min: { type: ["number", "null"] }
        og_max: { type: ["number", "null"] }
        fg_min: { type: ["number", "null"] }
        fg_max: { type: ["number", "null"] }
        ibu_min: { type: ["number", "null"] }
        ibu_max: { type: ["number", "null"] }
        srm_min: { type: ["number", "null"] }
        srm_max: { type: ["number", "null"] }
        abv_min: { type: ["number", "null"] }
        abv_max: { type: ["number", "null"] }
        notes: { type: string, maxLength: 2000 }
    EquipmentProfile:
      type: object
      required: [id, tenant_id, name, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        name: { type: string }
        batch_size_liters: { type: ["number", "null"] }
        batch_volume_target_liters: { type: ["number", "null"] }
        element_power_watts: { type: ["number", "null"] }
        boil_size_liters: { type: ["number", "null"] }
        pre_boil_volume_liters: { type: ["number", "null"] }
        boil_time_minutes: { type: ["integer", "null"] }
        boil_off_rate_liters_per_hour: { type: ["number", "null"] }
        boil_temp_c: { type: ["number", "null"] }
        trub_loss_liters: { type: ["number", "null"] }
        mash_tun_deadspace_liters: { type: ["number", "null"] }
        mash_tun_loss_liters: { type: ["number", "null"] }
        hlt_deadspace_liters: { type: ["number", "null"] }
        fermenter_loss_liters: { type: ["number", "null"] }
        top_up_liters: { type: ["number", "null"] }
        mash_time_minutes: { type: ["integer", "null"] }
        brewhouse_efficiency_pct: { type: ["number", "null"] }
        mash_efficiency_pct: { type: ["number", "null"] }
        hop_utilisation_pct: { type: ["number", "null"] }
        aroma_hop_utilisation_pct: { type: ["number", "null"] }
        hop_stand_temp_c: { type: ["number", "null"] }
        altitude_m: { type: ["number", "null"] }
        cooling_shrinkage_pct: { type: ["number", "null"] }
        grain_absorption_l_per_kg: { type: ["number", "null"] }
        water_to_grain_ratio: { type: ["number", "null"] }
        sparge_water_reminder_liters: { type: ["number", "null"] }
        notes: { type: ["string", "null"] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    EquipmentRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 255 }
        batch_size_liters: { type: ["number", "null"] }
        batch_volume_target_liters: { type: ["number", "null"] }
        element_power_watts: { type: ["number", "null"] }
        boil_size_liters: { type: ["number", "null"] }
        pre_boil_volume_liters: { type: ["number", "null"] }
        boil_time_minutes: { type: ["integer", "null"] }
        boil_off_rate_liters_per_hour: { type: ["number", "null"] }
        boil_temp_c: { type: ["number", "null"] }
        trub_loss_liters: { type: ["number", "null"] }
        mash_tun_deadspace_liters: { type: ["number", "null"] }
        mash_tun_loss_liters: { type: ["number", "null"] }
        hlt_deadspace_liters: { type: ["number", "null"] }
        fermenter_loss_liters: { type: ["number", "null"] }
        top_up_liters: { type: ["number", "null"] }
        mash_time_minutes: { type: ["integer", "null"] }
        brewhouse_efficiency_pct: { type: ["number", "null"] }
        mash_efficiency_pct: { type: ["number", "null"] }
        hop_utilisation_pct: { type: ["number", "null"] }
        aroma_hop_utilisation_pct: { type: ["number", "null"] }
        hop_stand_temp_c: { type: ["number", "null"] }
        altitude_m: { type: ["number", "null"] }
        cooling_shrinkage_pct: { type: ["number", "null"] }
        grain_absorption_l_per_kg: { type: ["number", "null"] }
        water_to_grain_ratio: { type: ["number", "null"] }
        sparge_water_reminder_liters: { type: ["number", "null"] }
        notes: { type: string, maxLength: 2000 }
    MashStep:
      type: object
      required: [id, mash_profile_id, step_order, step_type, target_temp_c, hold_minutes]
      properties:
        id: { type: string, format: uuid }
        mash_profile_id: { type: string, format: uuid }
        step_order: { type: integer }
        step_type: { type: string, enum: [infusion, temperature, decoction] }
        target_temp_c: { type: number }
        hold_minutes: { type: integer }
        infusion_volume_liters: { type: ["number", "null"] }
    MashProfile:
      type: object
      required: [id, tenant_id, name, mash_steps, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        name: { type: string }
        notes: { type: ["string", "null"] }
        mash_steps:
          type: array
          items: { $ref: "#/components/schemas/MashStep" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    MashProfileRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 255 }
        notes: { type: string, maxLength: 2000 }
        mash_steps:
          type: array
          items:
            type: object
            required: [step_order, step_type, target_temp_c, hold_minutes]
            properties:
              step_order: { type: integer }
              step_type: { type: string, enum: [infusion, temperature, decoction] }
              target_temp_c: { type: number }
              hold_minutes: { type: integer }
              infusion_volume_liters: { type: ["number", "null"] }
    Yeast:
      type: object
      required: [id, tenant_id, name, type, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        name: { type: string }
        type: { type: string, enum: [ale, lager, wheat, wine, champagne, other] }
        lab: { type: ["string", "null"] }
        product_code: { type: ["string", "null"] }
        attenuation_min: { type: ["number", "null"] }
        attenuation_max: { type: ["number", "null"] }
        temp_min_c: { type: ["number", "null"] }
        temp_max_c: { type: ["number", "null"] }
        flocculation: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    YeastRequest:
      type: object
      required: [name, type]
      properties:
        name: { type: string, minLength: 1, maxLength: 255 }
        type: { type: string, enum: [ale, lager, wheat, wine, champagne, other] }
        lab: { type: string, maxLength: 100 }
        product_code: { type: string, maxLength: 100 }
        attenuation_min: { type: ["number", "null"] }
        attenuation_max: { type: ["number", "null"] }
        temp_min_c: { type: ["number", "null"] }
        temp_max_c: { type: ["number", "null"] }
        flocculation: { type: string, maxLength: 50 }
        notes: { type: string, maxLength: 2000 }
    LibraryFermentable:
      type: object
      required: [id, tenant_id, name, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        name: { type: string }
        supplier: { type: ["string", "null"] }
        type: { type: ["string", "null"] }
        colour_ebc_min: { type: ["number", "null"] }
        colour_ebc_max: { type: ["number", "null"] }
        extract_litres_per_kg: { type: ["number", "null"] }
        moisture_pct_max: { type: ["number", "null"] }
        tn_min: { type: ["number", "null"] }
        tn_max: { type: ["number", "null"] }
        snr_min: { type: ["number", "null"] }
        snr_max: { type: ["number", "null"] }
        attributes: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    LibraryFermentableRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 255 }
        supplier: { type: string }
        type: { type: string }
        colour_ebc_min: { type: ["number", "null"] }
        colour_ebc_max: { type: ["number", "null"] }
        extract_litres_per_kg: { type: ["number", "null"] }
        moisture_pct_max: { type: ["number", "null"] }
        tn_min: { type: ["number", "null"] }
        tn_max: { type: ["number", "null"] }
        snr_min: { type: ["number", "null"] }
        snr_max: { type: ["number", "null"] }
        attributes: { type: string }
        notes: { type: string }
    PatchLibraryFermentableRequest:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 255 }
        supplier: { type: ["string", "null"] }
        type: { type: ["string", "null"] }
        colour_ebc_min: { type: ["number", "null"] }
        colour_ebc_max: { type: ["number", "null"] }
        extract_litres_per_kg: { type: ["number", "null"] }
        moisture_pct_max: { type: ["number", "null"] }
        tn_min: { type: ["number", "null"] }
        tn_max: { type: ["number", "null"] }
        snr_min: { type: ["number", "null"] }
        snr_max: { type: ["number", "null"] }
        attributes: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
    Ingredient:
      type: object
      required: [id, tenant_id, type, name, amount, unit, lot_number, cost_pence, cost_currency, allergens, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        type: { type: string, enum: [fermentable, hop, yeast, adjunct, chemical, other] }
        name: { type: string }
        amount: { type: number }
        unit: { type: string, enum: [kg, g, L, mL, count] }
        lot_number: { type: string }
        best_before_date: { type: string, format: date }
        cost_pence: { type: integer }
        cost_currency: { type: string }
        supplier: { type: ["string", "null"] }
        origin: { type: ["string", "null"] }
        color_ebc: { type: ["number", "null"] }
        alpha_acid_pct: { type: ["number", "null"] }
        attenuation_pct: { type: ["number", "null"] }
        allergens: { type: array, items: { type: string } }
        notes: { type: ["string", "null"] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    CreateIngredientRequest:
      type: object
      required: [type, name, amount, unit, lot_number]
      properties:
        type: { type: string, enum: [fermentable, hop, yeast, adjunct, chemical, other] }
        name: { type: string, minLength: 1, maxLength: 255 }
        amount: { type: number, exclusiveMinimum: 0 }
        unit: { type: string, enum: [kg, g, L, mL, count] }
        lot_number: { type: string }
        best_before_date: { type: string, format: date }
        cost_pence: { type: integer, minimum: 0 }
        cost_currency: { type: ["string", "null"] }
        supplier: { type: ["string", "null"] }
        origin: { type: ["string", "null"] }
        color_ebc: { type: ["number", "null"] }
        alpha_acid_pct: { type: ["number", "null"] }
        attenuation_pct: { type: ["number", "null"] }
        allergens: { type: array, items: { type: string } }
        notes: { type: ["string", "null"] }
    PatchIngredientRequest:
      type: object
      properties:
        type: { type: string, enum: [fermentable, hop, yeast, adjunct, chemical, other] }
        name: { type: string }
        amount: { type: number }
        unit: { type: string, enum: [kg, g, L, mL, count] }
        lot_number: { type: string }
        best_before_date: { type: string, format: date }
        cost_pence: { type: integer }
        cost_currency: { type: string }
        supplier: { type: ["string", "null"] }
        origin: { type: ["string", "null"] }
        color_ebc: { type: ["number", "null"] }
        alpha_acid_pct: { type: ["number", "null"] }
